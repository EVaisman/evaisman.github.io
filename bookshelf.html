---
layout: default
permalink: bookshelf/
title: "Bookshelf"
---

<div class="header-image">
</div>

<div class="wrapper">
    <div class="page-content">
        {% for book in site.data.books %}
        <article class="book">
            <h2 class="book-title">
                <a href="{{ book.url }}">{{ book.title }}</a>
            </h2>
            <section class="book-author">{{ book.author }}</section>
            <section>{{ book.description }}</section>
        </article>
        {% endfor %}
    </div>
</div>
