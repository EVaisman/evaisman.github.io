---
layout: default
---
<div class="home">

    <h1 class="page-heading"><b>BOOKSHELF</b></h1>
    
    <ul>
        {% for book in site.data.books %}
        <h1><a href="{{ book.url }}">{{ book.title }}</a></h1>
        <h2><br>{{ book.author }}</br></h2>
        <p> {{ book.description }} </p>
        {% endfor %}
    </ul>

</div>
