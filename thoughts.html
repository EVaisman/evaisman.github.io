---
layout: default
---
<div class="home">

    <h1 class="page-heading"><b>THOUGHTS</b></h1>
    
    <ul>
        {% for post in site.posts %}
        <a href="{{ post.url }}">{{ post.title }}</a>
        <br>{{ post.date | date: "%m.%d.%Y" }}</br>
        <p>
            {{ post.excerpt }}
        </p>
        {% endfor %}
    </ul>

</div>
