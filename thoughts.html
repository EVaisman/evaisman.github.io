---
layout: default
permalink: thoughts/
title: "Thoughts"
---

<div class="wrapper">
    <div class="thoughts-header-image"></div>
        <div class="page-content">
            {% for post in site.posts %}
            <article class="post-excerpt">
                <section class="post-date">{{ post.date | date: "%m.%d.%y" }}</section>
                <a class="post-title" href="{{ post.url }}"}>{{ post.title }}</a>
                <section>{{ post.excerpt }}</section>
            </article>
            {% endfor %}
        </div>
    </div>
</div>
