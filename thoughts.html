---
layout: default
permalink: thoughts/
title: "Thoughts"
---

<div class="thoughts-header-image"></div>

<div class="wrapper">
    <div class="page-content">
        {% for post in site.posts %}
        <article class="post-excerpt">
            <section class="post-date">{{ post.date | date: "%B %-d, %Y" }}</section>
            <h2 class="post-title">
                <a href="{{ post.url }}">{{ post.title }}</a>
            </h2>
            <section>{{ post.excerpt }}</section>
        </article>
        {% endfor %}
    </div>
</div>
